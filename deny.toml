# deny.toml — supply-chain policy for jeryu
# Run: cargo deny check

[graph]
targets = []

[advisories]
version = 2
ignore = [
    # RUSTSEC-2021-0140: rusttype is unmaintained (>2 years). Transitive
    # dependency via tuiwright (from jankurai v1.4.1). Cannot be fixed in
    # this repo — would require tuiwright to switch to ab_glyph upstream.
    "RUSTSEC-2021-0140",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
skip = [
    { crate = "bitflags@1.3.2", reason = "Transitive platform dependency; tracked as V2.0.1 duplicate baseline." },
    { crate = "block-buffer@0.10.4", reason = "Transitive crypto dependency; tracked as V2.0.1 duplicate baseline." },
    { crate = "cpufeatures@0.2.17", reason = "Transitive crypto dependency; tracked as V2.0.1 duplicate baseline." },
    { crate = "crypto-common@0.1.7", reason = "Transitive crypto dependency; tracked as V2.0.1 duplicate baseline." },
