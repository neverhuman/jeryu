paths = [
  '''(^|/)target/''',
  '''(^|/)\.jankurai/''',
  '''(^|/)agent/repo-score\.json$''',
  '''(^|/)agent/repo-score\.md$''',
  '''(^|/)agent/score-history\.csv$''',
  '''(^|/)agent/score-history\.jsonl$''',
  '''(^|/)agent-map\.json$''',
  '''(^|/)test-map\.json$''',
  '''(^|/)src/honeypot\.rs$''',
  '''(^|/)tips/''',
  '''(^|/)docs/''',
  '''(^|/)paper/''',
  '''(^|/)CHANGELOG\.md$''',
  '''(^|/)README\.md$''',
]
