[extend]
useDefault = true

[[allowlists]]
description = "Ignore generated audit receipts and build artifacts"
paths = [
  '''(^|/)target/''',
  '''(^|/)agent/repo-score\.json$''',
  '''(^|/)agent/repo-score\.md$''',
  '''(^|/)agent/score-history\.csv$''',
  '''(^|/)agent/score-history\.jsonl$''',
]

[[allowlists]]
description = "Honeypot module — INTENTIONAL decoy markers (aws-honey-marker, npm-honey-marker etc.). Gitleaks matches the variable-name pattern; the actual values are public sentinels, not real credentials."
paths = [
  '''(^|/)src/honeypot\.rs$''',
]

[[allowlists]]
description = "Documentation / tips / scratch notes — may reference API key concepts but never contains real credentials. Brainstorm files generated by humans + agents."
paths = [
  '''(^|/)tips/''',
  '''(^|/)docs/''',
  '''(^|/)paper/''',
  '''(^|/)CHANGELOG\.md$''',
  '''(^|/)README\.md$''',
]
