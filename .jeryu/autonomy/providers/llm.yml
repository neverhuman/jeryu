# .jeryu/autonomy/providers/llm.yml — free-only per-role LLM router chains.
#
# Schema: vibegate.providers.v1
#
# This file is the canonical `chains:` map: one ordered chain per reviewer role.
# The parser
# lives in `src/llm/provider_chains.rs` (`ProvidersConfig` / `ProviderEntry`);
# call sites resolve a router via `build_router_for_role` in `src/bin/autonomy.rs`.
#
# -----------------------------------------------------------------------------
# SECURITY NOTE — keys NEVER live in this file.
# -----------------------------------------------------------------------------
# Every entry declares `api_key_secret: <ENV_NAME>` (a *name*, never a value).
# Real values are resolved at runtime by the canonical `SecretResolver` chain in
# `src/llm/secrets.rs`:
#     1. --llm-key CLI flag
#     2. process env var
#     3. ~/.jeryu/secrets/llm.env  (canonical user-default; dotenvy format)
#     4. <repo>/.env.local         (gitignored)
#     5. CI secret (injected as env var; tier #2 catches it)
# In CI mode (CI=true) tiers 3-4 are skipped — only env wins.
#
# If you accidentally paste a real key here: revoke it at the provider, scrub
# it from git history, and re-read `docs/llm-reviewers.md`. Gitleaks is wired
# into CI and the pre-commit hook.
# -----------------------------------------------------------------------------

schema: vibegate.providers.v1

# Default role chain for diagnostics and UI display. Runtime reviewer dispatch
# still requires the exact requested `chains.<reviewer-role>` entry.
default_role_chain: [reviewer-security]

chains:
  # ---- Security reviewer (most important — 2-deep free failover) -----------
  reviewer-security:
    - provider: openrouter
      base_url: https://openrouter.ai/api/v1
      model_id: nvidia/nemotron-3-super-120b-a12b:free
      api_key_secret: OPENROUTER_API_KEY
      data_use: no_train
      temperature: 0.0
      timeout_ms: 30000
    - provider: openrouter
      base_url: https://openrouter.ai/api/v1
      model_id: openai/gpt-oss-120b:free
      api_key_secret: OPENROUTER_API_KEY
      data_use: no_train
      temperature: 0.0
      timeout_ms: 30000

  # ---- Test-integrity reviewer (free-only failover chain) ------------------
  reviewer-test-integrity:
    - provider: openrouter
      base_url: https://openrouter.ai/api/v1
