name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
  schedule:
    - cron: "0 3 * * 1"  # weekly Monday 03:00 UTC

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
          components: rustfmt
      - name: Check formatting
        run: bash ops/ci/rust-lane.sh fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
          components: clippy
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Run clippy
        run: bash ops/ci/rust-lane.sh clippy

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Build workspace
        run: bash ops/ci/rust-lane.sh build

  install-smoke:
    name: Install Smoke
    runs-on: ${{ matrix.os }}
    needs: [build]
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Run install commands
        run: bash ops/ci/rust-lane.sh install-smoke

  test-select:
    name: VTI Test Selection
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      unit_filter_expr: ${{ steps.plan.outputs.unit_filter_expr }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Compute test plan
        id: plan
        run: bash ops/ci/rust-lane.sh test-select
      - name: Upload test plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vti-test-plan
          path: target/jeryu/test-plan.json

  test-lib:
    name: Library Tests
    runs-on: ubuntu-latest
    needs: [build, test-select]
    timeout-minutes: 30
    # Skip unit tests entirely when VTI says docs_only (no logic changed)
    if: needs.test-select.outputs.mode != 'docs_only'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # autonomy::shadow tests use git2 to walk the local repo's history;
          # default shallow clones produce a detached HEAD with no
          # refs/heads/main, which the tests interpret as "skip". Fetching
          # full history lets the tests actually run.
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Install nextest
        uses: taiki-e/install-action@65f36558ea9682525f70919321ba6b20e4a8d7a6 # nextest
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Download VTI plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: vti-test-plan
          path: target/jeryu/
        continue-on-error: true
      - name: Run library tests
        env:
          MODE: ${{ needs.test-select.outputs.mode }}
          FILTER: ${{ needs.test-select.outputs.unit_filter_expr }}
        run: bash ops/ci/rust-lane.sh test-lib "$MODE" "$FILTER"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-select]
    timeout-minutes: 45
    # Only run integration tests when VTI says Full or Selected (not DocsOnly)
    if: needs.test-select.outputs.mode != 'docs_only'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # See library-tests above: shadow tests need full git history.
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Run integration tests
        run: bash ops/ci/rust-lane.sh test-integration

  tui-smoke:
    name: TUI Smoke
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Render one TUI frame
        run: bash ops/ci/rust-lane.sh tui-smoke

  supply-chain:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Install cargo-deny
        uses: taiki-e/install-action@4276f5c5467209401f06d04b0026ae72e3bf4b97 # cargo-deny
      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Security lane proof
        run: bash ops/ci/rust-lane.sh supply-chain
      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-evidence
          path: target/jankurai/security/*
          if-no-files-found: warn

  witness:
    name: Witness Graph
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Build witness graph
        run: bash ops/ci/rust-lane.sh witness
      - name: Upload witness graph
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: witness-graph
          path: .witness/witness-graph.json
          if-no-files-found: warn

  vrc-map:
    name: VRC Map
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Generate agent + test maps
        run: bash ops/ci/rust-lane.sh vrc-map
      - name: Upload maps
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrc-maps
          path: |
            agent-map.json
            test-map.json
          if-no-files-found: warn

  vrc-plan:
    name: VRC Plan
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Run VRC plan
        run: bash ops/ci/rust-lane.sh vrc-plan
      - name: Upload VRC plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vrc-plan
          path: vrc-plan.json
          if-no-files-found: warn

  aer-scan:
    name: AER Structural Audit
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Scan for structural exceptions
        run: bash ops/ci/rust-lane.sh aer
      - name: Upload AER findings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aer-findings
          path: aer-findings.json
          if-no-files-found: warn

  scheduled-hardening:
    name: Scheduled Hardening
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run on the weekly schedule trigger, not on push/PR
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@2917690e52aa4d7197c24238e2a04e6775cc8170 # cargo-semver-checks
      - name: Semver check
        run: bash ops/ci/rust-lane.sh semver-check
      - name: AER structural audit
        run: bash ops/ci/rust-lane.sh aer
      - name: Upload hardening findings
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hardening-aer-findings
          path: aer-findings.json
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # SSH Install End-to-End — Docker container with sshd
  # ─────────────────────────────────────────────────────────────────────────
  ssh-install-e2e:
    name: SSH Install E2E
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Run SSH install integration test
        run: bash ops/ci/rust-lane.sh ssh-install-e2e
      - name: Upload SSH install evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ssh-install-evidence
          path: target/ci-evidence/ssh-install/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # TUI Screenshots — Capture all tabs and upload as artifacts
  # ─────────────────────────────────────────────────────────────────────────
  tui-screenshots:
    name: TUI Screenshots
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Render deterministic TUI PNG captures
        run: bash ops/ci/rust-lane.sh tui-screenshots
      - name: Record 10-second animated TUI GIF
        # tuiwright is a git dev-dependency pinned to the jankurai commit SHA.
        # Cargo fetches it directly; no path-dep clone is required.
        run: bash ops/ci/rust-lane.sh tui-recording
      - name: Upload TUI screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tui-screenshots
          path: target/ci-screenshots/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Fixture Project Validation — Prove the test fixture compiles and passes
  # ─────────────────────────────────────────────────────────────────────────
  fixture-project-tests:
    name: Fixture Project Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.95.0
      - name: Build and test fixture project
        working-directory: tests/fixtures/fixture_project
        run: bash ../../../ops/ci/rust-lane.sh fixture-project-test
      - name: Verify fixture project is healthy
        working-directory: tests/fixtures/fixture_project
        run: bash ../../../ops/ci/rust-lane.sh fixture-project-clippy
