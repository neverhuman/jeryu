name: jankurai

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: jankurai-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install mold
        run: sudo apt-get install -y mold
      - name: Install cargo-deny
        uses: taiki-e/install-action@4276f5c5467209401f06d04b0026ae72e3bf4b97 # cargo-deny
      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@8b2082c2d404d46ed01b1ea6ba5d10e26788c99e # cargo-cyclonedx
      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install jankurai
        run: cargo install --git https://github.com/neverhuman/jankurai jankurai --locked
      - run: jankurai --version
      - name: Workflow lint
        run: actionlint .github/workflows/*.yml
      - name: Security strict preflight
        run: jankurai security run . --strict --profile ci --out target/jankurai/security/evidence.json
      - name: jankurai audit
        run: jankurai audit . --mode advisory --baseline agent/repo-score.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md --sarif target/jankurai/jankurai.sarif --github-step-summary target/jankurai/summary.md --repair-queue-jsonl target/jankurai/repair-queue.jsonl
      - name: Jankurai ratchet audit
        run: |
          mkdir -p target/jankurai
          git show origin/main:agent/repo-score.json > target/jankurai/accepted-baseline.json
          jankurai audit . --mode ratchet --baseline target/jankurai/accepted-baseline.json --json target/jankurai/repo-score.json --md target/jankurai/repo-score.md
      - name: Upload jankurai SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          sarif_file: target/jankurai/jankurai.sarif
          category: jankurai
      - name: Proofbind verify
        run: jankurai proofbind verify . --changed-from origin/main
      - name: Proofmark rust
        run: jankurai proofmark rust . --obligations target/jankurai/proofbind/obligations.json
      - name: Rust witness build
        run: jankurai rust witness build .
      - name: Workspace map
        run: cargo run -p cargo-vrc -- map --output-dir .
      - name: AER scan
        run: cargo run -p cargo-aer -- scan --output target/jankurai/aer-findings.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
      - name: Checkout UX QA tool
        run: git clone --depth 1 https://github.com/neverhuman/jankurai target/jankurai-ux-qa-tool
      - name: Install UX QA dependencies
        working-directory: target/jankurai-ux-qa-tool
        run: npm ci
      - name: Install UX QA browsers
        working-directory: target/jankurai-ux-qa-tool
        run: npx playwright install chromium --with-deps
      - name: Build UX QA tool
        working-directory: target/jankurai-ux-qa-tool
        run: npm run ux-qa:build
      - name: language-bad-behavior
        run: cargo test -p jeryu --test language_bad_behavior
      - name: ci-bad-behavior
        run: cargo test -p jeryu --test language_bad_behavior ci_bad_behavior_lane_is_blocking -- --exact --test-threads=1
        if: always()
      - name: Upload ci-bad-behavior artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ci-bad-behavior
          path: target/jankurai/ci-bad-behavior.log
      - name: git-bad-behavior
        run: cargo test -p jeryu --test language_bad_behavior git_bad_behavior_lane_is_blocking -- --exact --test-threads=1
      - name: Upload git-bad-behavior artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: git-bad-behavior
          path: target/jankurai/git-bad-behavior.log
      - name: release-bad-behavior
        run: cargo test -p jeryu --test language_bad_behavior release_bad_behavior_lane_is_blocking -- --exact --test-threads=1
      - name: Upload release-bad-behavior artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-bad-behavior
          path: target/jankurai/release-bad-behavior.log
      - name: Migration analyze
        run: jankurai migrate . --analyze --out target/jankurai/migration-report.json
      - name: UX QA smoke
        run: node target/jankurai-ux-qa-tool/packages/ux-qa/dist/cli.js audit --config agent/ux-qa.toml --out target/jankurai/ux-qa.json
      - name: Security lane proof
        run: jankurai security run . --out target/jankurai/security/evidence.json
      - name: Generate CycloneDX SBOM
        if: always()
        run: |
          mkdir -p target/jankurai/sbom
          cargo cyclonedx --format json --override-filename sbom
          mv sbom.json target/jankurai/sbom/
          test -f target/jankurai/sbom/sbom.json

      - name: Attest build provenance
        if: always()
        uses: actions/attest-build-provenance@92c65d2898f1f53cfdc910b962cecff86e7f8fcc # v1
        with:
          subject-path: target/jankurai/sbom/*.json
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: jankurai-adoption-evidence
          if-no-files-found: ignore
          path: |
            target/jankurai/repo-score.json
            target/jankurai/repo-score.md
            target/jankurai/jankurai.sarif
            target/jankurai/repair-queue.jsonl
            target/jankurai/proofbind/obligations.json
            target/jankurai/proofbind/surface-witness.json
            target/jankurai/proofmark/proofmark-receipt.json
            target/jankurai/proofmark/proof-receipt.json
            target/jankurai/rust/witness-graph.json
            target/jankurai/aer-findings.json
            target/jankurai/language-bad-behavior.log
            target/jankurai/ci-bad-behavior.log
            target/jankurai/git-bad-behavior.log
            target/jankurai/release-bad-behavior.log
            target/jankurai/ux-qa.json
            target/jankurai/security/*
            target/jankurai/sbom/*
            target/jankurai/migration-report.json
