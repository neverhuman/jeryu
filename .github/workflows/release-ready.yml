name: release-ready

# Thin CI lane. The source of truth lives at ops/ci/release-ready-lane.sh so
# local rehearsals and CI execute identical commands (jankurai HLT-042).
# Composes the jeryu/release-ready Check Run — the single required gate on
# `main`. See docs/release-policy.md and release.policy.toml.

on:
  pull_request:
    branches: ["main"]
  merge_group:

concurrency:
  group: release-ready-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  gate:
    name: jeryu/release-ready
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Set up Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Compose gate
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          JERYU_EMIT_STATUS: "1"
        run: bash ops/ci/release-ready-lane.sh
