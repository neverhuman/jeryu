[db]
allowed_truth_paths = ["python/ai-service"]
constraint_paths = ["db/constraints"]
migration_paths = ["db/migrations"]
root_paths = [
    "db",
    "src/cache/",
    "src/state.rs",
    "src/taint.rs",
]

[python]
allowed_truth_paths = ["python/ai-service"]

[queues]
adapter_paths = [
    "crates/adapters/queues",
    "crates/adapters/src/queues",
]
client_markers = [
    "jansu",
    "tansu",
    "iggy",
    "fluvio",
    "nats",
    "redis streams",
]
event_contract_paths = ["contracts/events"]
generated_paths = ["contracts/generated"]
generated_type_paths = ["contracts/generated"]

[rust]
domain_paths = [
    "src/cli.rs",
    "src/dispatch.rs",
    "src/main.rs",
    "src/capability.rs",
    "src/mcp.rs",
    "src/engine.rs",
    "src/release.rs",
    "src/secrets.rs",
    "src/test_intel/",
    "src/state.rs",
    "src/decision.rs",
    "src/capsule.rs",
    "src/impact.rs",
    "crates/domain",
    "crates/*/src/domain",
]
forbidden_domain_imports = [
    "std::fs",
    "std::env",
    "std::net",
    "std::time::SystemTime",
    "rand::",
    "sqlx::",
    "diesel::",
    "reqwest::",
    "jansu::",
    "tracing::",
    "log::",
]
generated_contract_paths = ["contracts/generated"]
generated_paths = ["contracts/generated"]

[stack]
id = "rust-ts-vite-react-redline-jansu-bounded-python"
version = "0.4.0"

[[streaming_exception]]
classification = "brownfield"
expires = "2026-12-31"
migration_path = "Keep Jansu behind generated event contracts and observable Rust queue adapters; evaluate Tansu, Apache Iggy, and Fluvio with replay, compatibility, and operations proof before replacement."
owner = "platform"
runtime = "jansu"

[typescript]
forbidden_web_imports = [
    "sqlx",
    "sqlx",
    "mysql",
    "@aws-sdk/client-s3",
]
generated_contract_paths = ["contracts/generated"]
generated_paths = ["contracts/generated"]
web_paths = [
    "apps/web",
    "packages/web",
    "packages/ui",
]
