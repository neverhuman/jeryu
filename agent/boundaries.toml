[stack]
id = "rust-ts-vite-react-postgres-bounded-python"
version = "0.4.0"

[rust]
generated_contract_paths = ["contracts/generated"]
generated_paths = ["contracts/generated"]
domain_paths = ["src/decision.rs", "src/capsule.rs", "src/impact.rs"]
forbidden_domain_imports = [
  "std::fs",
  "std::env",
  "std::net",
  "std::time::SystemTime",
  "rand::",
  "sqlx::",
  "diesel::",
  "reqwest::",
  "rdkafka::",
  "tracing::",
  "log::"
]

[typescript]
web_paths = ["apps/web", "packages/web", "packages/ui"]
forbidden_web_imports = ["sqlx", "pg", "postgres", "mysql", "better-sqlite3", "@aws-sdk/client-s3"]
generated_contract_paths = ["contracts/generated"]
generated_paths = ["contracts/generated"]

[db]
root_paths = ["db", "src/state.rs", "src/taint.rs"]
allowed_truth_paths = ["python/ai-service"]

[queues]
adapter_paths = ["crates/adapters/queues", "crates/adapters/src/queues"]
event_contract_paths = ["contracts/events"]
generated_type_paths = ["contracts/generated"]
generated_paths = ["contracts/generated"]
client_markers = ["rdkafka", "kafkajs", "tansu", "iggy", "fluvio", "nats", "redis streams"]

[[streaming_exception]]
runtime = "kafka"
classification = "brownfield"
owner = "platform"
expires = "2026-12-31"
migration_path = "Keep Kafka behind generated event contracts and observable Rust queue adapters; evaluate Tansu, Apache Iggy, and Fluvio with replay, compatibility, and operations proof before replacement."
